<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="End-to-end encrypted, serverless P2P chat" />
    <meta name="theme-color" content="#6c5ce7" />
    <title>DecentChat</title>
    <style>
      body { margin: 0; background: #0f0f23; color: #e2e4e9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      @media (prefers-color-scheme: light) { body { background: #ffffff; color: #1a1a2e; } }
      #loading {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 16px; transition: opacity 0.3s;
      }
      #loading .logo { font-size: 32px; font-weight: 700; }
      #loading .spinner {
        width: 32px; height: 32px; border: 3px solid rgba(108, 92, 231, 0.2);
        border-top-color: #6c5ce7; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #loading .hint { font-size: 13px; opacity: 0.5; margin-top: 8px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="logo">⚡ DecentChat</div>
      <div class="spinner"></div>
      <div class="hint">Initializing encryption...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
