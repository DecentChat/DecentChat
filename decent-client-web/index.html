<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="End-to-end encrypted, serverless P2P chat" />
    <meta name="theme-color" content="#6c5ce7" />
    <title>DecentChat</title>
    <style>
      body { margin: 0; background: #0f0f23; color: #e2e4e9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      @media (prefers-color-scheme: light) { body { background: #ffffff; color: #1a1a2e; } }
      #loading {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 16px; transition: opacity 0.3s;
      }
      #loading .loading-logo { width: 120px; height: auto; object-fit: contain; animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
      @media (prefers-color-scheme: dark) { #loading .loading-logo { content: url('/icons/logo-v2-dark.png'); } }
      #loading .logo { font-size: 32px; font-weight: 700; }
      #loading .spinner {
        width: 32px; height: 32px; border: 3px solid rgba(108, 92, 231, 0.2);
        border-top-color: #6c5ce7; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #loading .hint { font-size: 13px; opacity: 0.5; margin-top: 8px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading" role="status" aria-live="polite">
      <img src="/icons/logo-v2-light.png" alt="DecentChat" class="loading-logo" />
      <div class="logo">DecentChat</div>
      <div class="spinner" aria-hidden="true"></div>
      <div class="hint" aria-label="Loading status">Initializing encryption...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
