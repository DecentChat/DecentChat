# detect-secrets exclusion patterns (regex)
#
# Note: detect-secrets does not read this file by default. If you want these
# applied, wire them into your scan command (e.g. translate to --exclude-files
# / --exclude-lines) or into a baseline's filters_used.

[exclude-files]
# Bun lockfile contains lots of high-entropy package integrity blobs.
pattern = (^|/)bun\.lock$
# Generated output and test artifacts.
pattern = (^|/)(dist|node_modules|test-results|playwright-report|blob-report|\.tmp|\.worktrees)/
# Playwright browser profile data (hashes, fingerprints, TLS state).
pattern = (^|/)profile-output/
# iOS native project files.
pattern = (^|/)ios/
# Local config file with allowlist patterns.
pattern = (^|/)\.detect-secrets\.cfg$

[exclude-lines]
# Crypto test fixtures often contain hex/base64 strings that look like secrets.
# Add patterns here as false positives surface during development.
